
<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>EV Fleet Manager</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput [(ngModel)]="credentials.username" name="username" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" [(ngModel)]="credentials.password" name="password" required>
        </mat-form-field>

        <div class="error" *ngIf="error">{{ error }}</div>
        
        <button mat-raised-button color="primary" type="submit" class="full-width">
          Login
        </button>
      </form>
    </mat-card-content>
    <mat-card-actions align="end">
      <a mat-button routerLink="/register">Create Account</a>
    </mat-card-actions>
  </mat-card>
</div>
