<div class="register-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Create Account</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="register()">
        
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput [(ngModel)]="userData.username" name="username" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" [(ngModel)]="userData.password" name="password" required>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Role</mat-label>
          <mat-select [(ngModel)]="userData.role" name="role">
            <mat-option value="DRIVER">Driver</mat-option>
            <mat-option value="ADMIN">Fleet Manager (Admin)</mat-option>
          </mat-select>
        </mat-form-field>

        <div class="error" *ngIf="error">{{ error }}</div>
        
        <button mat-raised-button color="primary" type="submit" class="full-width">
          Register
        </button>
      </form>
    </mat-card-content>
    
    <mat-card-actions align="end">
      <a mat-button routerLink="/login">Already have an account? Login</a>
    </mat-card-actions>
  </mat-card>
</div>
