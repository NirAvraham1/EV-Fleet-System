<div class="actions-bar" *ngIf="isAdmin">
  <button mat-raised-button color="primary" (click)="openAddVehicleDialog()">
    <mat-icon>add</mat-icon> Add Vehicle
  </button>
</div>

<div class="table-container">
  <table mat-table [dataSource]="vehicles" class="mat-elevation-z8">
    <ng-container matColumnDef="model">
      <th mat-header-cell *matHeaderCellDef> Model </th>
      <td mat-cell *matCellDef="let vehicle"> <strong>{{vehicle.model}}</strong> </td>
    </ng-container>

    <ng-container matColumnDef="licensePlate">
      <th mat-header-cell *matHeaderCellDef> License Plate </th>
      <td mat-cell *matCellDef="let vehicle"> {{vehicle.licensePlate}} </td>
    </ng-container>

    <ng-container matColumnDef="batteryLevel">
      <th mat-header-cell *matHeaderCellDef> Battery </th>
      <td mat-cell *matCellDef="let vehicle"> 
        <div class="battery-indicator">
          <mat-icon [style.color]="vehicle.batteryLevel > 20 ? 'green' : 'red'">battery_std</mat-icon>
          {{vehicle.batteryLevel}}%
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let vehicle">
        <span [style.color]="getStatusColor(vehicle.status)" class="status-badge">
          {{vehicle.status}}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef> Location </th>
      <td mat-cell *matCellDef="let vehicle"> {{vehicle.location}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let vehicle">
        <ng-container *ngIf="isAdmin">
          <button mat-icon-button color="primary" (click)="toggleStatus(vehicle)" title="Change Status">
            <mat-icon>{{ vehicle.status === 'AVAILABLE' ? 'ev_station' : 'check_circle' }}</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteVehicle(vehicle.id!)" title="Delete Vehicle">
            <mat-icon>delete</mat-icon>
          </button>
        </ng-container>
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [length]="totalVehicles"
                 [pageSize]="pageSize"
                 [pageSizeOptions]="[5, 10, 20]"
                 (page)="onPageChange($event)"
                 showFirstLastButtons>
  </mat-paginator>

</div>
